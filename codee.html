<body
  class="bg-surface-bright font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
  <!-- Top Navigation (Shell suppressed for Transactional Splash Screen) -->
  <main class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    <!-- Artistic Brush Stroke Overlay -->
    <div
      class="absolute -top-20 -left-20 w-96 h-96 opacity-10 pointer-events-none rotate-12 bg-tertiary-container blur-[80px] rounded-full">
    </div>
    <div
      class="absolute -bottom-20 -right-20 w-80 h-80 opacity-10 pointer-events-none -rotate-12 bg-secondary-container blur-[80px] rounded-full">
    </div>
    <!-- Header: Couples Names -->
    <header class="mb-12 text-center">
      <h1 class="font-headline text-3xl italic tracking-tighter text-secondary">
        ედი &amp; ნინო
      </h1>
      <div class="w-12 h-[1px] bg-outline-variant/30 mx-auto mt-4"></div>
    </header>
    <!-- Envelope Container -->
    <div class="relative group cursor-pointer transition-transform duration-500 hover:scale-[1.02] active:scale-[0.98]"
      onclick="transitionToMain()">
      <!-- The Envelope Body -->
      <div
        class="relative w-[340px] md:w-[460px] aspect-[4/3] bg-surface-container-low rounded-xl envelope-shadow overflow-hidden p-1">
        <!-- Gold Foil Decorative Edge -->
        <div class="absolute inset-0 border-[3px] border-primary-fixed/20 m-4 pointer-events-none"></div>
        <!-- Envelope Flap Visuals -->
        <div class="absolute top-0 left-0 w-full h-1/2">
          <svg class="w-full h-full drop-shadow-sm" fill="none" viewbox="0 0 460 230"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M0 0 H460 V20 L230 140 L0 20 V0Z" fill="#efeee9"></path>
            <path d="M0 0 L230 145 L460 0" stroke="#f5ce53" stroke-opacity="0.3" stroke-width="1.5"></path>
          </svg>
        </div>
        <!-- Deep Burgundy Wax Seal -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
          <div
            class="w-16 h-16 rounded-full bg-tertiary-dim wax-seal-depth border-2 border-tertiary flex items-center justify-center relative overflow-hidden">
            <!-- Texture of wax -->
            <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_30%_30%,#ffffff,transparent)]"></div>
            <!-- Seal Icon -->
            <span class="material-symbols-outlined text-primary-fixed text-3xl"
              style="font-variation-settings: 'FILL' 1;">
              favorite
            </span>
          </div>
        </div>
        <!-- Subtle Paper Texture Overlay -->

  <!-- Bottom Navigation Shell (Suppressed: Task-Focused Screen) -->
  <!-- Wax Seal FAB (Suppressed: Transactional Screen) -->
  <script>
    function transitionToMain() {
      const mainWrap = document.querySelector('main');
      mainWrap.style.transition = 'opacity 0.7s ease-in-out, transform 0.7s ease-in-out, filter 0.7s ease-in-out';
      mainWrap.style.opacity = '0';
      mainWrap.style.transform = 'scale(1.05)';
      mainWrap.style.filter = 'blur(8px)';
      
      setTimeout(() => {
        window.location.href = '../main/index.html';
      }, 700);
    }
  </script>
